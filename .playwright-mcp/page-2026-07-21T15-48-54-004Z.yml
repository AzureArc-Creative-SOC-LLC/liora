          - generic [ref=e487]:
            - button "How is the product packaged?" [ref=e488] [cursor=pointer]
            - paragraph [ref=e493]: Products are sealed inside tamper-evident research kits with pre-filled research devices. Cold-chain packaging is used where the compound requires refrigeration.
