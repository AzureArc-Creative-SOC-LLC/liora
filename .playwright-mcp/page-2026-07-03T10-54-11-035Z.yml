        - generic [ref=e443]:
          - generic [ref=e444]:
            - button "What documentation comes with each order?" [expanded] [ref=e445] [cursor=pointer]:
              - generic [ref=e446]: What documentation comes with each order?
              - img [ref=e448]
            - paragraph [ref=e452]: Every vial ships with a certificate of analysis listing lot number, synthesis date, HPLC purity, and mass-spec confirmation. Storage and handling notes are included on the packing slip.
          - generic [ref=e453]:
            - button "How is purity verified?" [ref=e454] [cursor=pointer]:
              - generic [ref=e455]: How is purity verified?
              - img [ref=e457]
            - paragraph [ref=e459]: Each batch is independently tested by reverse-phase HPLC and high-resolution mass spectrometry. We retain a reference sample from every lot for cross-verification on request.
          - generic [ref=e460]:
            - button "How are shipments packaged?" [ref=e461] [cursor=pointer]:
              - generic [ref=e462]: How are shipments packaged?
              - img [ref=e464]
            - paragraph [ref=e466]: Vials ship in insulated double-walled mailers with phase-change gel packs sized for the destination's transit window. Temperature loggers are included on orders above a set threshold or on request.
          - generic [ref=e467]:
            - button "Do you ship outside the UAE?" [ref=e468] [cursor=pointer]:
              - generic [ref=e469]: Do you ship outside the UAE?
              - img [ref=e471]
            - paragraph [ref=e473]: Yes — we currently dispatch across the GCC and to select international research addresses. Some destinations require additional import documentation; we'll confirm what's needed before processing.
          - generic [ref=e474]:
            - button "How long does delivery take?" [ref=e475] [cursor=pointer]:
              - generic [ref=e476]: How long does delivery take?
              - img [ref=e478]
            - paragraph [ref=e480]: UAE orders typically arrive within 24–48 hours of despatch. GCC orders arrive in 2–4 working days. International shipments depend on customs clearance at the destination.
          - generic [ref=e481]:
            - button "What's the return policy?" [ref=e482] [cursor=pointer]:
              - generic [ref=e483]: What's the return policy?
              - img [ref=e485]
            - paragraph [ref=e487]: We don't accept returns on opened or temperature-compromised vials. If a shipment arrives damaged or out of spec, contact us within 48 hours of delivery and we'll replace or refund.
          - generic [ref=e488]:
            - button "How can I pay?" [ref=e489] [cursor=pointer]:
              - generic [ref=e490]: How can I pay?
              - img [ref=e492]
            - paragraph [ref=e494]: Bank transfer, card payments via our checkout, and crypto on request. Institutional purchase orders are accepted with prior credit approval.
