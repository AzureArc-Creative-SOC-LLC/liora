      - generic [ref=e876]:
        - generic [ref=e877]:
          - button "Are these products for human consumption?" [expanded] [ref=e878] [cursor=pointer]:
            - generic [ref=e879]: Are these products for human consumption?
            - generic [ref=e880]: +
          - paragraph [ref=e883]: No. Everything in our catalogue is supplied strictly for laboratory and academic research. They are not intended for personal use, supplementation, or any in-vivo application in humans or animals outside a controlled research setting.
        - generic [ref=e884]:
          - button "What documentation comes with each order?" [ref=e885] [cursor=pointer]:
            - generic [ref=e886]: What documentation comes with each order?
            - generic [ref=e887]: +
          - paragraph [ref=e888]: Every vial ships with a certificate of analysis listing lot number, synthesis date, HPLC purity, and mass-spec confirmation. Storage and handling notes are included on the packing slip.
        - generic [ref=e889]:
