            - paragraph [ref=e479]: Every research kit is paired with a batch-specific certificate of analysis listing lot number, HPLC purity, and mass-spec confirmation. Storage and handling notes are included on the packing slip.
          - generic [ref=e480]:
            - button "How is purity verified?" [ref=e481] [cursor=pointer]
