            - generic [ref=e891]: How is purity verified?
            - generic [ref=e892]: +
          - paragraph [ref=e893]: Each batch is independently tested by reverse-phase HPLC and high-resolution mass spectrometry. We retain a reference sample from every lot for cross-verification on request.
        - generic [ref=e894]:
