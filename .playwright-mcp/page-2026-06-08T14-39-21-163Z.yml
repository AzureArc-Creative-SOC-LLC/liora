            - generic [ref=e896]: How are shipments packaged?
            - generic [ref=e897]: +
          - paragraph [ref=e898]: Vials ship in insulated double-walled mailers with phase-change gel packs sized for the destination's transit window. Temperature loggers are included on orders above a set threshold or on request.
        - generic [ref=e899]:
